<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AniStream — Watch Anime Free</title>
    <meta name="theme-color" content="#0B0D12">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #0B0D12;
            --panel: #151822;
            --panel-2: #1B1F2B;
            --gold: #C9A24B;
            --gold-dim: rgba(201, 162, 75, 0.15);
            --teal: #2E5F5A;
            --ink: #EDE8DD;
            --ink-dim: #9BA0AE;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        
        body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            padding-bottom: 80px;
            overflow-x: hidden;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
        
        /* Top Bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(11, 13, 18, 0.92);
            backdrop-filter: blur(14px);
            position: sticky;
            top: 0;
            z-index: 40;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .brand {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #C9A24B, #E8D5A3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .brand .badge {
            font-size: 10px;
            background: rgba(201, 162, 75, 0.2);
            padding: 2px 8px;
            border-radius: 12px;
            -webkit-text-fill-color: var(--gold);
            border: 1px solid rgba(201, 162, 75, 0.2);
        }
        
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .search-toggle {
            background: var(--panel-2);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--ink);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        
        .search-toggle:hover {
            border-color: var(--gold);
        }
        
        .refresh-btn {
            background: var(--gold);
            border: none;
            color: #161208;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(201, 162, 75, 0.3);
        }
        
        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Search Bar */
        .search-bar {
            background: var(--panel);
            padding: 12px 20px;
            display: none;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .search-bar.open {
            display: block;
        }
        
        .search-input-wrap {
            display: flex;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .search-input-wrap input {
            flex: 1;
            background: var(--panel-2);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 12px 20px;
            color: var(--ink);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-input-wrap input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(201, 162, 75, 0.1);
        }
        
        .search-input-wrap input::placeholder {
            color: var(--ink-dim);
        }
        
        .search-input-wrap .clear-btn {
            background: var(--panel-2);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--ink-dim);
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--panel);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .stats-bar .left {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--ink-dim);
        }
        
        .stats-bar .left .count {
            color: var(--ink);
            font-weight: 600;
        }
        
        .stats-bar .left .update-time {
            font-size: 11px;
        }
        
        .stats-bar .right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .filter-btn {
            background: var(--panel-2);
            border: 1px solid rgba(255,255,255,0.06);
            color: var(--ink-dim);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--gold-dim);
        }
        
        /* Episode Grid */
        .grid-container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        
        /* Episode Card - Premium */
        .episode-card {
            background: var(--panel);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            position: relative;
        }
        
        .episode-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow);
            border-color: var(--gold);
        }
        
        .episode-card .thumb {
            position: relative;
            padding-top: 56.25%;
            background: var(--panel-2);
            overflow: hidden;
        }
        
        .episode-card .thumb img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        
        .episode-card:hover .thumb img {
            transform: scale(1.05);
        }
        
        .episode-card .badges {
            position: absolute;
            top: 8px;
            left: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            z-index: 2;
        }
        
        .episode-card .badges span {
            background: rgba(0,0,0,0.8);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .episode-card .badges .quality {
            color: #4CAF50;
        }
        
        .episode-card .badges .type {
            color: #FF9800;
        }
        
        .episode-card .badges .ep-num {
            color: var(--gold);
        }
        
        .episode-card .badges .rating {
            color: #FFD700;
        }
        
        .episode-card .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 3;
        }
        
        .episode-card:hover .play-overlay {
            opacity: 1;
        }
        
        .episode-card .play-overlay .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--gold);
            border: none;
            color: #161208;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(201, 162, 75, 0.4);
        }
        
        .episode-card .play-overlay .play-btn:hover {
            transform: scale(1.1);
        }
        
        .episode-card .info {
            padding: 14px 16px 12px;
        }
        
        .episode-card .info .title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
        }
        
        .episode-card .info .description {
            font-size: 13px;
            color: var(--ink-dim);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 6px 0;
            min-height: 36px;
        }
        
        .episode-card .info .meta-row {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--ink-dim);
            flex-wrap: wrap;
            margin-top: 6px;
        }
        
        .episode-card .info .meta-row span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .episode-card .checkbox-wrapper {
            padding: 8px 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .episode-card .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--gold);
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .episode-card .checkbox-wrapper label {
            font-size: 13px;
            color: var(--ink-dim);
            cursor: pointer;
            flex: 1;
        }
        
        .episode-card .checkbox-wrapper .ep-time {
            font-size: 11px;
            color: var(--ink-dim);
            opacity: 0.6;
        }
        
        /* Loading State */
        .loading-card {
            background: var(--panel);
            border-radius: var(--radius);
            padding: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.06);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Empty State */
        .empty-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 20px;
            color: var(--ink-dim);
        }
        
        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            color: var(--ink);
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .empty-state p {
            font-size: 14px;
        }
        
        /* Player Modal */
        .player-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            z-index: 1000;
            flex-direction: column;
        }
        
        .player-modal.open {
            display: flex;
        }
        
        .player-modal .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(0,0,0,0.9);
            z-index: 2;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .player-modal .player-header .title {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
            margin: 0 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .player-modal .player-header .close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--ink);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .player-modal .player-header .close-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .player-modal .video-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
            min-height: 300px;
        }
        
        .player-modal .video-wrapper video {
            max-width: 100%;
            max-height: 100%;
            background: #000;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .player-modal .player-error {
            color: var(--ink-dim);
            text-align: center;
            padding: 40px;
        }
        
        .player-modal .player-error .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* Download Queue */
        .download-queue {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(14px);
            display: none;
            align-items: center;
            gap: 16px;
            z-index: 100;
            max-width: 90%;
            box-shadow: var(--shadow);
        }
        
        .download-queue.visible {
            display: flex;
        }
        
        .download-queue .queue-info {
            font-size: 14px;
            color: var(--ink-dim);
            white-space: nowrap;
        }
        
        .download-queue .queue-btn {
            background: var(--gold);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 13px;
            color: #161208;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .download-queue .queue-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(201, 162, 75, 0.3);
        }
        
        .download-queue .queue-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .download-queue .queue-clear {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--ink-dim);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .download-queue .queue-clear:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* Download Progress */
        .download-progress {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel);
            padding: 16px 24px;
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(14px);
            display: none;
            z-index: 100;
            min-width: 320px;
            max-width: 90%;
            box-shadow: var(--shadow);
        }
        
        .download-progress.visible {
            display: block;
        }
        
        .download-progress .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .download-progress .progress-header .progress-label {
            color: var(--ink-dim);
        }
        
        .download-progress .progress-header .progress-percent {
            color: var(--gold);
            font-weight: 600;
        }
        
        .download-progress .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .download-progress .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold), #E8D5A3);
            transition: width 0.3s;
            width: 0%;
            border-radius: 2px;
        }
        
        .download-progress .progress-detail {
            font-size: 12px;
            color: var(--ink-dim);
            margin-top: 8px;
            text-align: center;
        }
        
        /* Bottom Nav */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(21,24,34,0.95);
            backdrop-filter: blur(14px);
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 50;
        }
        
        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 10px;
            color: var(--ink-dim);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 16px;
            transition: all 0.3s;
            position: relative;
        }
        
        .tab.active {
            color: var(--gold);
        }
        
        .tab .tab-icon {
            font-size: 22px;
        }
        
        .tab .tab-badge {
            position: absolute;
            top: 0;
            right: 4px;
            background: var(--gold);
            color: #161208;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 16px;
            text-align: center;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .episode-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 14px;
            }
            
            .topbar {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .brand {
                font-size: 20px;
            }
            
            .brand .badge {
                display: none;
            }
            
            .refresh-btn span:last-child {
                display: none;
            }
            
            .search-toggle span {
                display: none;
            }
            
            .stats-bar {
                padding: 8px 16px;
                font-size: 12px;
            }
            
            .stats-bar .left .update-time {
                display: none;
            }
            
            .grid-container {
                padding: 12px;
            }
            
            .download-queue {
                padding: 10px 16px;
                gap: 10px;
                bottom: 72px;
            }
            
            .download-queue .queue-info {
                font-size: 12px;
            }
            
            .download-progress {
                min-width: 280px;
                bottom: 130px;
                padding: 14px 18px;
            }
        }
        
        @media (max-width: 480px) {
            .episode-grid {
                grid-template-columns: 1fr;
            }
            
            .search-input-wrap {
                flex-direction: column;
            }
            
            .search-input-wrap .clear-btn {
                padding: 10px;
            }
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .episode-card {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        
        .episode-card:nth-child(1) { animation-delay: 0.05s; }
        .episode-card:nth-child(2) { animation-delay: 0.10s; }
        .episode-card:nth-child(3) { animation-delay: 0.15s; }
        .episode-card:nth-child(4) { animation-delay: 0.20s; }
        .episode-card:nth-child(5) { animation-delay: 0.25s; }
        .episode-card:nth-child(6) { animation-delay: 0.30s; }
        .episode-card:nth-child(7) { animation-delay: 0.35s; }
        .episode-card:nth-child(8) { animation-delay: 0.40s; }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="topbar">
        <div class="brand">
            AniStream
            <span class="badge">FREE</span>
        </div>
        <div class="topbar-actions">
            <button class="search-toggle" id="searchToggle">
                <span>🔍</span>
                <span>Search</span>
            </button>
            <button class="refresh-btn" id="refreshBtn">
                <span>↻</span>
                <span>Refresh</span>
            </button>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar" id="searchBar">
        <div class="search-input-wrap">
            <input type="text" id="searchInput" placeholder="Search by title, episode, or genre...">
            <button class="clear-btn" id="clearSearch">✕ Clear</button>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="left">
            <span class="count" id="episodeCount">0 episodes</span>
            <span class="update-time" id="updateTime">⏳ Loading...</span>
        </div>
        <div class="right">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="hd">HD</button>
            <button class="filter-btn" data-filter="sub">Sub</button>
            <button class="filter-btn" data-filter="dub">Dub</button>
        </div>
    </div>

    <!-- Grid Container -->
    <div class="grid-container">
        <div class="episode-grid" id="episodeGrid">
            <!-- Loading -->
            <div class="loading-card">
                <div class="loading-spinner"></div>
            </div>
            <div class="loading-card">
                <div class="loading-spinner"></div>
            </div>
            <div class="loading-card">
                <div class="loading-spinner"></div>
            </div>
            <div class="loading-card">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <!-- Download Queue -->
    <div class="download-queue" id="downloadQueue">
        <span class="queue-info" id="queueInfo">0 episodes selected</span>
        <button class="queue-btn" id="downloadQueueBtn">⬇ Download Queue</button>
        <button class="queue-clear" id="clearQueue">✕</button>
    </div>

    <!-- Download Progress -->
    <div class="download-progress" id="downloadProgress">
        <div class="progress-header">
            <span class="progress-label" id="progressLabel">Preparing download...</span>
            <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>
        <div class="progress-detail" id="progressDetail">Waiting to start...</div>
    </div>

    <!-- Player Modal -->
    <div class="player-modal" id="playerModal">
        <div class="player-header">
            <button class="close-btn" id="closePlayer">✕</button>
            <span class="title" id="playerTitle">Now Playing</span>
            <div style="width:36px;"></div>
        </div>
        <div class="video-wrapper" id="videoWrapper">
            <video id="videoPlayer" controls playsinline></video>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="tabbar">
        <button class="tab active" data-tab="home">
            <div class="tab-icon">⌂</div>
            Home
        </button>
        <button class="tab" data-tab="library">
            <div class="tab-icon">▤</div>
            Library
        </button>
        <button class="tab" data-tab="downloads" id="downloadsTab">
            <div class="tab-icon">⬇</div>
            Downloads
            <span class="tab-badge" id="downloadBadge" style="display:none;">0</span>
        </button>
        <button class="tab" data-tab="profile">
            <div class="tab-icon">◐</div>
            Profile
        </button>
    </div>

    <script>
    // ============================================================
    // COMPLETE FRONTEND APPLICATION - FIXED
    // ============================================================
    
    // API Configuration
    const API_BASE = window.location.hostname === 'localhost' 
        ? 'http://localhost:3000/api' 
        : 'https://anime-stream-backend.vercel.app/api';  // ← CHANGE THIS
    
    // State
    let episodes = [];
    let filteredEpisodes = [];
    let selectedEpisodes = new Set();
    let isDownloading = false;
    let downloadQueue = [];
    let currentFilter = 'all';
    
    // DOM Refs
    const grid = document.getElementById('episodeGrid');
    const countEl = document.getElementById('episodeCount');
    const updateTimeEl = document.getElementById('updateTime');
    const refreshBtn = document.getElementById('refreshBtn');
    const searchToggle = document.getElementById('searchToggle');
    const searchBar = document.getElementById('searchBar');
    const searchInput = document.getElementById('searchInput');
    const clearSearch = document.getElementById('clearSearch');
    const playerModal = document.getElementById('playerModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const videoWrapper = document.getElementById('videoWrapper');
    const playerTitle = document.getElementById('playerTitle');
    const closePlayerBtn = document.getElementById('closePlayer');
    const downloadQueueEl = document.getElementById('downloadQueue');
    const queueInfo = document.getElementById('queueInfo');
    const downloadQueueBtn = document.getElementById('downloadQueueBtn');
    const clearQueueBtn = document.getElementById('clearQueue');
    const downloadProgressEl = document.getElementById('downloadProgress');
    const progressLabel = document.getElementById('progressLabel');
    const progressPercent = document.getElementById('progressPercent');
    const progressFill = document.getElementById('progressFill');
    const progressDetail = document.getElementById('progressDetail');
    const downloadBadge = document.getElementById('downloadBadge');
    const filterBtns = document.querySelectorAll('.filter-btn');
    
    // ============================================================
    // FETCH EPISODES
    // ============================================================
    async function fetchEpisodes() {
        refreshBtn.disabled = true;
        refreshBtn.innerHTML = '<span class="loading-spinner" style="width:18px;height:18px;"></span>';
        
        try {
            const response = await fetch(`${API_BASE}/episodes`);
            if (!response.ok) throw new Error('Failed to fetch');
            
            const data = await response.json();
            
            if (data.success && data.episodes && data.episodes.length > 0) {
                episodes = data.episodes;
                filteredEpisodes = [...episodes];
                renderEpisodes(filteredEpisodes);
                countEl.textContent = `${episodes.length} episodes`;
                updateTimeEl.textContent = `📅 Updated: ${new Date(data.lastUpdated).toLocaleString()}`;
            } else {
                showEmptyState('No episodes found. Try searching for an anime!');
            }
        } catch (error) {
            console.error('Fetch error:', error);
            showEmptyState('Failed to load episodes. Try searching for an anime!');
        } finally {
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = '<span>↻</span><span>Refresh</span>';
        }
    }
    
    // ============================================================
    // RENDER EPISODES
    // ============================================================
    function renderEpisodes(items) {
        if (!items || items.length === 0) {
            showEmptyState('No episodes match your search.');
            return;
        }
        
        grid.innerHTML = items.map((ep, index) => `
            <div class="episode-card" data-index="${index}" data-ep-id="${ep.id || index}">
                <div class="thumb">
                    ${ep.image ? `<img src="${ep.image}" alt="${ep.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\'display:flex;align-items:center;justify-content:center;height:100%;background:linear-gradient(135deg,#1B1F2B,#0B0D12);color:var(--ink-dim);font-size:48px;\'>🎬</div>'">` : 
                                 `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:linear-gradient(135deg,#1B1F2B,#0B0D12);color:var(--ink-dim);font-size:48px;">🎬</div>`}
                    <div class="badges">
                        ${ep.episode ? `<span class="ep-num">EP ${ep.episode}</span>` : ''}
                        ${ep.quality ? `<span class="quality">${ep.quality}</span>` : ''}
                        ${ep.type ? `<span class="type">${ep.type}</span>` : ''}
                        ${ep.rating && ep.rating !== 'N/A' ? `<span class="rating">⭐ ${ep.rating}</span>` : ''}
                    </div>
                    <div class="play-overlay">
                        <button class="play-btn" data-index="${index}">▶</button>
                    </div>
                </div>
                <div class="info">
                    <div class="title">${ep.title}</div>
                    ${ep.description ? `<div class="description">${ep.description}</div>` : ''}
                    <div class="meta-row">
                        ${ep.releaseDate ? `<span>📅 ${new Date(ep.releaseDate).toLocaleDateString()}</span>` : ''}
                        ${ep.studio ? `<span>🏢 ${ep.studio}</span>` : ''}
                        ${ep.season ? `<span>📺 ${ep.season}</span>` : ''}
                        ${ep.genres && ep.genres.length > 0 ? `<span>🏷️ ${ep.genres.slice(0,2).join(', ')}</span>` : ''}
                    </div>
                </div>
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="ep_${index}" data-index="${index}" 
                           ${selectedEpisodes.has(index) ? 'checked' : ''}>
                    <label for="ep_${index}">Queue for download</label>
                    <span class="ep-time">${ep.timestamp ? new Date(ep.timestamp).toLocaleTimeString() : ''}</span>
                </div>
            </div>
        `).join('');
        
        attachEventListeners();
        updateQueueUI();
    }
    
    function showEmptyState(message) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="icon">📺</div>
                <h3>${message}</h3>
                <p>Try refreshing or check back later for new episodes.</p>
            </div>
        `;
        countEl.textContent = '0 episodes';
    }
    
    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    function attachEventListeners() {
        grid.querySelectorAll('.play-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const index = parseInt(btn.dataset.index);
                const actualIndex = getActualIndex(index);
                if (actualIndex !== -1) openPlayer(actualIndex);
            });
        });
        
        grid.querySelectorAll('.episode-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.checkbox-wrapper') && !e.target.closest('.play-overlay')) {
                    const index = parseInt(card.dataset.index);
                    const actualIndex = getActualIndex(index);
                    if (actualIndex !== -1) openPlayer(actualIndex);
                }
            });
        });
        
        grid.querySelectorAll('input[type="checkbox"]').forEach(cb => {
            cb.addEventListener('change', () => {
                const index = parseInt(cb.dataset.index);
                const actualIndex = getActualIndex(index);
                if (actualIndex !== -1) {
                    if (cb.checked) {
                        selectedEpisodes.add(actualIndex);
                    } else {
                        selectedEpisodes.delete(actualIndex);
                    }
                    updateQueueUI();
                }
            });
        });
    }
    
    function getActualIndex(displayIndex) {
        const ep = filteredEpisodes[displayIndex];
        if (!ep) return -1;
        return episodes.findIndex(e => e.id === ep.id || (e.title === ep.title && e.episode === ep.episode));
    }
    
    // ============================================================
    // QUEUE UI
    // ============================================================
    function updateQueueUI() {
        const count = selectedEpisodes.size;
        if (count > 0) {
            downloadQueueEl.classList.add('visible');
            queueInfo.textContent = `${count} episode${count > 1 ? 's' : ''} selected`;
            downloadBadge.textContent = count;
            downloadBadge.style.display = 'block';
        } else {
            downloadQueueEl.classList.remove('visible');
            downloadBadge.style.display = 'none';
        }
    }
    
    // ============================================================
    // PLAYER - FIXED
    // ============================================================
    async function openPlayer(index) {
        const episode = episodes[index];
        if (!episode) return;
        
        playerTitle.textContent = `${episode.title}`;
        playerModal.classList.add('open');
        
        // Show loading
        videoWrapper.innerHTML = `
            <div style="text-align:center;padding:40px;color:var(--ink-dim);">
                <div class="loading-spinner" style="margin:0 auto 16px;"></div>
                <p>Fetching video link...</p>
            </div>
        `;
        
        try {
            let videoUrl = null;
            
            if (episode.link) {
                const response = await fetch(`${API_BASE}/getvideo?url=${encodeURIComponent(episode.link)}`);
                const data = await response.json();
                if (data.success && data.videoUrl) {
                    videoUrl = data.videoUrl;
                }
            }
            
            if (!videoUrl && episode.title) {
                const searchResponse = await fetch(`${API_BASE}/search?q=${encodeURIComponent(episode.title)}`);
                const searchData = await searchResponse.json();
                if (searchData.success && searchData.results && searchData.results.length > 0) {
                    const firstResult = searchData.results[0];
                    const videoResponse = await fetch(`${API_BASE}/getvideo?url=${encodeURIComponent(firstResult.url)}`);
                    const videoData = await videoResponse.json();
                    if (videoData.success && videoData.videoUrl) {
                        videoUrl = videoData.videoUrl;
                    }
                }
            }
            
            if (videoUrl) {
                videoWrapper.innerHTML = `<video id="videoPlayer" controls playsinline></video>`;
                const finalVideo = document.getElementById('videoPlayer');
                initializePlayer(finalVideo, videoUrl);
            } else {
                showPlayerError('No video link found. Try a different episode.');
            }
            
        } catch (error) {
            console.error('Player error:', error);
            showPlayerError('Failed to load video. Please try again.');
        }
    }
    
    // ✅ FIXED - Added this missing function
    function initializePlayer(video, videoUrl) {
        if (Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backbufferLength: 30,
                maxBufferLength: 30,
            });
            hls.loadSource(videoUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play().catch(() => {});
            });
            video._hls = hls;
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoUrl;
            video.addEventListener('loadedmetadata', () => {
                video.play().catch(() => {});
            });
        } else {
            showPlayerError('HLS not supported in this browser.');
        }
    }
    
    // ✅ FIXED - Added this missing function
    function closePlayer() {
        playerModal.classList.remove('open');
        const video = document.getElementById('videoPlayer');
        if (video) {
            if (video._hls) {
                video._hls.destroy();
                delete video._hls;
            }
            video.pause();
            video.removeAttribute('src');
            video.load();
        }
        videoWrapper.innerHTML = `<video id="videoPlayer" controls playsinline></video>`;
    }
    
    function showPlayerError(message) {
        videoWrapper.innerHTML = `
            <div class="player-error">
                <div class="icon">⚠️</div>
                <p>${message}</p>
            </div>
        `;
    }
    
    // ============================================================
    // SEARCH - FIXED
    // ============================================================
    async function searchAnime(query) {
        if (!query || query.length < 2) {
            showEmptyState('Type at least 2 characters to search');
            return;
        }
        
        refreshBtn.disabled = true;
        refreshBtn.innerHTML = '<span class="loading-spinner" style="width:18px;height:18px;"></span>';
        
        try {
            const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            if (data.success && data.results && data.results.length > 0) {
                episodes = data.results.map((result, index) => ({
                    id: index + 1,
                    title: result.title,
                    episode: index + 1,
                    description: `Found on ${result.source}`,
                    image: null,
                    link: result.url,
                    quality: 'HD',
                    type: 'Subbed',
                    rating: 'N/A',
                    releaseDate: new Date().toISOString().split('T')[0],
                    timestamp: new Date().toISOString(),
                    season: 'Search Result',
                    studio: result.source,
                    genres: [],
                    source: result.source
                }));
                
                filteredEpisodes = [...episodes];
                renderEpisodes(filteredEpisodes);
                countEl.textContent = `${episodes.length} search results`;
                updateTimeEl.textContent = `🔍 Searching for: "${query}"`;
            } else {
                showEmptyState(`No results found for "${query}". Try a different search.`);
            }
        } catch (error) {
            console.error('Search error:', error);
            showEmptyState('Search failed. Please try again.');
        } finally {
            refreshBtn.disabled = false;
            refreshBtn.innerHTML = '<span>↻</span><span>Refresh</span>';
        }
    }
    
    // ============================================================
    // DOWNLOAD QUEUE
    // ============================================================
    async function startDownloadQueue() {
        if (isDownloading || selectedEpisodes.size === 0) return;
        
        isDownloading = true;
        downloadQueueBtn.disabled = true;
        downloadQueueBtn.textContent = '⏳ Processing...';
        
        const selectedIndices = Array.from(selectedEpisodes).sort((a, b) => a - b);
        downloadQueue = selectedIndices.map(i => ({ index: i, ...episodes[i] }));
        
        if (downloadQueue.length === 0) {
            resetDownloadQueue();
            return;
        }
        
        downloadProgressEl.classList.add('visible');
        let completed = 0;
        const total = downloadQueue.length;
        
        for (let i = 0; i < downloadQueue.length; i++) {
            const item = downloadQueue[i];
            const progress = Math.round((i / total) * 100);
            
            progressLabel.textContent = `⬇ Downloading: ${item.title}`;
            progressPercent.textContent = `${progress}%`;
            progressFill.style.width = `${progress}%`;
            progressDetail.textContent = `Episode ${i+1} of ${total}`;
            
            try {
                if (item.link) {
                    const response = await fetch(`${API_BASE}/getvideo?url=${encodeURIComponent(item.link)}`);
                    const data = await response.json();
                    if (data.success && data.videoUrl) {
                        await downloadVideo(data.videoUrl, `${item.title.replace(/[^a-z0-9]/gi, '_')}.mp4`);
                        completed++;
                    }
                }
            } catch (error) {
                console.error(`Download failed for ${item.title}:`, error);
            }
        }
        
        progressLabel.textContent = '✅ Download complete!';
        progressPercent.textContent = '100%';
        progressFill.style.width = '100%';
        progressDetail.textContent = `Successfully downloaded ${completed} of ${total} episodes`;
        
        setTimeout(() => {
            downloadProgressEl.classList.remove('visible');
            resetDownloadQueue();
            selectedEpisodes.clear();
            renderEpisodes(filteredEpisodes);
        }, 3000);
    }
    
    async function downloadVideo(videoUrl, filename) {
        try {
            if (videoUrl.includes('.m3u8')) {
                const manifestResponse = await fetch(videoUrl);
                const manifestText = await manifestResponse.text();
                
                let segmentUrls = manifestText.split('\n')
                    .filter(line => line.trim() && !line.startsWith('#') && !line.includes('.m3u8'))
                    .map(line => {
                        if (line.startsWith('http')) return line;
                        const baseUrl = videoUrl.substring(0, videoUrl.lastIndexOf('/') + 1);
                        return baseUrl + line;
                    });
                
                if (segmentUrls.length === 0) {
                    const variantUrls = manifestText.split('\n')
                        .filter(line => line.includes('.m3u8') && !line.startsWith('#'))
                        .map(line => {
                            if (line.startsWith('http')) return line;
                            const baseUrl = videoUrl.substring(0, videoUrl.lastIndexOf('/') + 1);
                            return baseUrl + line;
                        });
                    
                    if (variantUrls.length > 0) {
                        const variantResponse = await fetch(variantUrls[0]);
                        const variantText = await variantResponse.text();
                        segmentUrls = variantText.split('\n')
                            .filter(line => line.trim() && !line.startsWith('#') && !line.includes('.m3u8'))
                            .map(line => {
                                if (line.startsWith('http')) return line;
                                const baseUrl = variantUrls[0].substring(0, variantUrls[0].lastIndexOf('/') + 1);
                                return baseUrl + line;
                            });
                    }
                }
                
                if (segmentUrls.length > 0) {
                    await downloadSegments(segmentUrls, filename);
                }
            } else {
                const response = await fetch(videoUrl);
                const blob = await response.blob();
                triggerDownload(blob, filename);
            }
        } catch (error) {
            console.error('Download error:', error);
            throw error;
        }
    }
    
    async function downloadSegments(segmentUrls, filename) {
        const chunks = [];
        const chunkSize = 5;
        
        for (let i = 0; i < segmentUrls.length; i += chunkSize) {
            const batch = segmentUrls.slice(i, i + chunkSize);
            const batchPromises = batch.map(url => fetch(url).then(res => res.arrayBuffer()));
            const batchResults = await Promise.all(batchPromises);
            chunks.push(...batchResults);
            
            const progress = Math.round(((i + batch.length) / segmentUrls.length) * 100);
            progressPercent.textContent = `${progress}%`;
            progressFill.style.width = `${progress}%`;
        }
        
        const totalLength = chunks.reduce((sum, chunk) => sum + chunk.byteLength, 0);
        const combined = new Uint8Array(totalLength);
        let offset = 0;
        for (const chunk of chunks) {
            combined.set(new Uint8Array(chunk), offset);
            offset += chunk.byteLength;
        }
        
        const blob = new Blob([combined], { type: 'video/mp4' });
        triggerDownload(blob, filename);
        chunks.length = 0;
    }
    
    function triggerDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
    }
    
    function resetDownloadQueue() {
        isDownloading = false;
        downloadQueueBtn.disabled = false;
        downloadQueueBtn.textContent = '⬇ Download Queue';
        downloadQueue = [];
    }
    
    // ============================================================
    // FILTERS
    // ============================================================
    function applyFilters() {
        const query = searchInput.value.toLowerCase().trim();
        let filtered = [...episodes];
        
        if (query) {
            filtered = filtered.filter(ep => 
                ep.title.toLowerCase().includes(query) ||
                (ep.episode && ep.episode.toString().includes(query)) ||
                (ep.description && ep.description.toLowerCase().includes(query)) ||
                (ep.genres && ep.genres.some(g => g.toLowerCase().includes(query)))
            );
        }
        
        if (currentFilter === 'hd') {
            filtered = filtered.filter(ep => ep.quality && ep.quality.includes('HD'));
        } else if (currentFilter === 'sub') {
            filtered = filtered.filter(ep => ep.type && ep.type.toLowerCase().includes('sub'));
        } else if (currentFilter === 'dub') {
            filtered = filtered.filter(ep => ep.type && ep.type.toLowerCase().includes('dub'));
        }
        
        filteredEpisodes = filtered;
        renderEpisodes(filteredEpisodes);
        countEl.textContent = `${filteredEpisodes.length} of ${episodes.length} episodes`;
    }
    
    // ============================================================
    // EVENT LISTENERS
    // ============================================================
    refreshBtn.addEventListener('click', fetchEpisodes);
    
    searchToggle.addEventListener('click', () => {
        searchBar.classList.toggle('open');
        if (searchBar.classList.contains('open')) {
            searchInput.focus();
        }
    });
    
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (query) {
                searchAnime(query);
                searchBar.classList.remove('open');
            }
        }
    });
    
    searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        if (query.length === 0) {
            fetchEpisodes();
        }
    });
    
    clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        searchBar.classList.remove('open');
        fetchEpisodes();
    });
    
    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            filterBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            applyFilters();
        });
    });
    
    closePlayerBtn.addEventListener('click', closePlayer);
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && playerModal.classList.contains('open')) {
            closePlayer();
        }
        if (e.key === 'Enter' && searchBar.classList.contains('open')) {
            applyFilters();
        }
    });
    
    downloadQueueBtn.addEventListener('click', startDownloadQueue);
    clearQueueBtn.addEventListener('click', () => {
        selectedEpisodes.clear();
        updateQueueUI();
        renderEpisodes(filteredEpisodes);
    });
    
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (tab.dataset.tab === 'downloads') {
                document.querySelector('.grid-container').scrollIntoView({ behavior: 'smooth' });
            }
        });
    });
    
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
            e.preventDefault();
            searchBar.classList.toggle('open');
            if (searchBar.classList.contains('open')) {
                searchInput.focus();
            }
        }
    });
    
    // ============================================================
    // INIT
    // ============================================================
    fetchEpisodes();
    
    setInterval(() => {
        if (document.visibilityState === 'visible') {
            fetchEpisodes();
        }
    }, 300000);
    
    console.log('🔥 AniStream loaded successfully!');
    console.log('📡 API:', API_BASE);
    
    window.addEventListener('beforeunload', () => {
        if (isDownloading) {
            resetDownloadQueue();
        }
    });
</script>
