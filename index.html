<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>REWIND — Anime Tape Deck</title>
<meta name="description" content="Discover anime, track what you're watching, and find where to stream it — legally.">
<meta name="theme-color" content="#0D1014">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<meta property="og:type" content="website">
<meta property="og:title" content="REWIND — Anime Tape Deck">
<meta property="og:description" content="Discover anime, track what you're watching, and find where to stream it — legally.">
<meta property="og:image" content="https://rewind-anime.vercel.app/icons/og-image.png">
<meta property="og:url" content="https://rewind-anime.vercel.app">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="REWIND — Anime Tape Deck">
<meta name="twitter:description" content="Discover anime, track what you're watching, and find where to stream it — legally.">
<meta name="twitter:image" content="https://rewind-anime.vercel.app/icons/og-image.png">

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>

<header class="deck">
  <div class="deck-brand">
    <span class="deck-logo">REWIND</span>
    <span class="deck-tag">be kind, please rewind</span>
  </div>
  <nav class="deck-tabs">
    <a class="deck-tab active" href="index.html">ON&nbsp;AIR</a>
    <a class="deck-tab" href="shelf.html">MY&nbsp;SHELF</a>
  </nav>
</header>

<div class="slot-wrap">
  <div class="slot">
    <div class="slot-led" id="slotLed"></div>
    <input type="text" id="searchInput" placeholder="INSERT TITLE AND PRESS PLAY…" autocomplete="off">
    <button class="slot-eject" id="clearSearch" title="Eject">⏏</button>
  </div>
  <div class="slot-readout" id="slotReadout">STANDBY · browsing what's trending</div>
</div>

<!-- HERO SPOTLIGHT -->
<section class="hero" id="hero"></section>

<div class="spool-row" id="genreRow">
  <button class="spool active" data-genre="all">ALL</button>
  <button class="spool" data-genre="1">Action</button>
  <button class="spool" data-genre="4">Comedy</button>
  <button class="spool" data-genre="8">Drama</button>
  <button class="spool" data-genre="10">Fantasy</button>
  <button class="spool" data-genre="22">Romance</button>
  <button class="spool" data-genre="24">Sci-Fi</button>
  <button class="spool" data-genre="36">Slice of Life</button>
</div>

<!-- SEARCH / GENRE RESULTS (hidden until used) -->
<main class="shelf-container" id="searchResultsContainer" style="display:none;">
  <div class="shelf-header">
    <h2 id="shelfTitle">Results</h2>
    <span class="shelf-count" id="shelfCount"></span>
  </div>
  <div class="shelf" id="shelf"></div>
  <button class="load-more" id="loadMore" style="display:none;">▼ LOAD MORE TAPES</button>
</main>

<!-- DEFAULT HOME SECTIONS -->
<div id="homeSections">
  <div class="section">
    <div class="section-head">
      <h2>Continue watching</h2>
      <a href="shelf.html">View shelf →</a>
    </div>
    <div class="row-scroll" id="continueRow"></div>
  </div>

  <div class="section">
    <div class="section-head"><h2>Latest episodes</h2></div>
    <div class="row-scroll" id="airingRow"></div>
  </div>

  <div class="section" style="padding-bottom:70px;">
    <div class="section-head"><h2>Trending now</h2></div>
    <div class="grid-section" id="trendingGrid"></div>
  </div>
</div>

<div class="tabbar">
  <a class="tab active" href="index.html">⏵ On Air</a>
  <a class="tab" href="shelf.html">☰ Shelf</a>
</div>

<script src="js/shared.js"></script>
<script src="js/home.js"></script>
</body>
</html>
